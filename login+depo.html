<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login & Register | Deposit System</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2e25 0%, #1a5a4a 50%, #0d3b2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .bg-bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            bottom: -160px;
            animation: square 20s infinite;
            border-radius: 50%;
        }

        .bg-bubbles li:nth-child(1) { left: 10%; width: 80px; height: 80px; animation-delay: 0s; }
        .bg-bubbles li:nth-child(2) { left: 20%; width: 60px; height: 60px; animation-delay: 2s; animation-duration: 17s; }
        .bg-bubbles li:nth-child(3) { left: 25%; width: 100px; height: 100px; animation-delay: 4s; }
        .bg-bubbles li:nth-child(4) { left: 40%; width: 50px; height: 50px; animation-delay: 1s; animation-duration: 22s; }
        .bg-bubbles li:nth-child(5) { left: 70%; width: 120px; height: 120px; animation-delay: 0s; }
        .bg-bubbles li:nth-child(6) { left: 80%; width: 70px; height: 70px; animation-delay: 3s; animation-duration: 18s; }
        .bg-bubbles li:nth-child(7) { left: 32%; width: 90px; height: 90px; animation-delay: 7s; }
        .bg-bubbles li:nth-child(8) { left: 55%; width: 45px; height: 45px; animation-delay: 15s; animation-duration: 40s; }
        .bg-bubbles li:nth-child(9) { left: 85%; width: 65px; height: 65px; animation-delay: 2s; animation-duration: 25s; }
        .bg-bubbles li:nth-child(10) { left: 90%; width: 110px; height: 110px; animation-delay: 11s; animation-duration: 30s; }

        @keyframes square {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.6; border-radius: 50%; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            z-index: 1;
            animation: fadeInUp 0.6s ease;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo-section i {
            font-size: 56px;
            background: #ff9800;
            padding: 18px;
            border-radius: 25px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .logo-section h2 {
            font-size: 28px;
            font-weight: 700;
        }

        .logo-section p {
            font-size: 14px;
            opacity: 0.8;
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 40px 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }

        .toggle-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 60px;
        }

        .toggle-btn {
            flex: 1;
            text-align: center;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            color: #64748b;
        }

        .toggle-btn.active {
            background: #1a5a4a;
            color: white;
            box-shadow: 0 4px 12px rgba(26, 90, 74, 0.3);
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
        }

        .form-group label i {
            margin-right: 8px;
            color: #1a5a4a;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #94a3b8;
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .input-wrapper input:focus {
            border-color: #ff9800;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            left: auto !important;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.3);
        }

        .demo-credentials {
            background: #f0fdf4;
            padding: 15px;
            border-radius: 16px;
            margin-top: 25px;
            border-left: 4px solid #22c55e;
        }

        .demo-credentials p {
            font-size: 13px;
            color: #166534;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .demo-credentials small {
            font-size: 12px;
            color: #15803d;
            display: block;
            font-family: monospace;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }

        .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .alert-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .alert-info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 550px) {
            .auth-card { padding: 30px 20px; }
            .logo-section i { font-size: 44px; padding: 14px; }
            .logo-section h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

<ul class="bg-bubbles">
    <li></li><li></li><li></li><li></li><li></li>
    <li></li><li></li><li></li><li></li><li></li>
</ul>

<div class="auth-container">
    <div class="logo-section">
        <i class="fas fa-money-bill-wave"></i>
        <h2>DepositHub</h2>
        <p>Secure Mobile Money Deposits</p>
    </div>

    <div class="auth-card">
        <div class="toggle-buttons">
            <button class="toggle-btn active" data-form="login"><i class="fas fa-sign-in-alt"></i> Login</button>
            <button class="toggle-btn" data-form="register"><i class="fas fa-user-plus"></i> Register</button>
        </div>

        <div id="alertContainer"></div>

        <!-- Login Form -->
        <div id="loginForm" class="form-container active">
            <form id="loginFormElement">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                </div>
                <button type="submit" class="submit-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="form-container">
            <form id="registerFormElement">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regFullname" placeholder="Enter your full name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone-alt"></i> Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone-alt"></i>
                        <input type="tel" id="regPhone" placeholder="e.g., 0767123456" required>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Create a password (min 6 characters)" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('regPassword', this)"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('regConfirmPassword', this)"></i>
                    </div>
                </div>
                <button type="submit" class="submit-btn"><i class="fas fa-user-plus"></i> Create Account</button>
            </form>
        </div>

        <div class="demo-credentials">
            <p><i class="fas fa-info-circle"></i> TrustDeposit Credentials</p>
            <small>📧 Email: Trustdeposit@deposithub.com</small>
            <small>📞 Phone: 0767332532</small>
        </div>
    </div>
</div>

<script>
    // Storage keys
    const USERS_STORAGE_KEY = 'deposit_users';
    const CURRENT_USER_KEY = 'current_logged_in_user';
    const TARGET_PHONE = "0767332532";

    function showAlert(message, type = 'error') {
        const alertContainer = document.getElementById('alertContainer');
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert alert-${type}`;
        let icon = type === 'success' ? '<i class="fas fa-check-circle"></i>' : 
                   (type === 'error' ? '<i class="fas fa-exclamation-circle"></i>' : '<i class="fas fa-info-circle"></i>');
        alertDiv.innerHTML = `${icon} ${message}`;
        alertContainer.appendChild(alertDiv);
        setTimeout(() => {
            alertDiv.style.animation = 'slideDown 0.3s ease reverse';
            setTimeout(() => alertDiv.remove(), 300);
        }, 4000);
    }

    function clearAlerts() {
        document.getElementById('alertContainer').innerHTML = '';
    }

    function togglePassword(inputId, element) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            element.classList.remove('fa-eye');
            element.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            element.classList.remove('fa-eye-slash');
            element.classList.add('fa-eye');
        }
    }

    function getUsers() {
        const users = localStorage.getItem(USERS_STORAGE_KEY);
        return users ? JSON.parse(users) : [];
    }

    function saveUsers(users) {
        localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(users));
    }

    function getUserByEmail(email) {
        const users = getUsers();
        return users.find(user => user.email.toLowerCase() === email.toLowerCase());
    }

    function isValidPhone(phone) {
        return /^07[0-9]{8}$/.test(phone);
    }

    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // REGISTER
    function registerUser(event) {
        event.preventDefault();
        clearAlerts();
        
        const fullname = document.getElementById('regFullname').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;
        
        if (!fullname) { showAlert('Please enter your full name', 'error'); return; }
        if (!phone) { showAlert('Please enter your phone number', 'error'); return; }
        if (!isValidPhone(phone)) { showAlert('Please enter a valid Tanzanian phone number (07xxxxxxxx)', 'error'); return; }
        if (!email) { showAlert('Please enter your email address', 'error'); return; }
        if (!isValidEmail(email)) { showAlert('Please enter a valid email address', 'error'); return; }
        if (!password) { showAlert('Please create a password', 'error'); return; }
        if (password.length < 6) { showAlert('Password must be at least 6 characters', 'error'); return; }
        if (password !== confirmPassword) { showAlert('Passwords do not match!', 'error'); return; }
        
        const existingUser = getUserByEmail(email);
        if (existingUser) { showAlert('This email is already registered. Please login.', 'error'); return; }
        
        const users = getUsers();
        if (users.some(user => user.phone === phone)) { showAlert('This phone number is already registered', 'error'); return; }
        
        const isAdmin = email === 'admin@deposithub.com';
        
        const newUser = {
            id: Date.now().toString(),
            fullname: fullname,
            phone: phone,
            email: email,
            password: password,
            role: isAdmin ? 'admin' : 'user',
            createdAt: new Date().toISOString(),
            targetPhone: TARGET_PHONE
        };
        
        users.push(newUser);
        saveUsers(users);
        
        showAlert('✅ Registration successful! Please login.', 'success');
        document.getElementById('registerFormElement').reset();
        
        setTimeout(() => {
            document.querySelector('.toggle-btn[data-form="login"]').click();
        }, 1500);
    }

    // LOGIN
    function loginUser(event) {
        event.preventDefault();
        clearAlerts();
        
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email) { showAlert('Please enter your email address', 'error'); return; }
        if (!password) { showAlert('Please enter your password', 'error'); return; }
        
        const user = getUserByEmail(email);
        
        if (!user) { showAlert('No account found. Please register first.', 'error'); return; }
        if (user.password !== password) { showAlert('Incorrect password. Please try again.', 'error'); return; }
        
        const currentUser = {
            id: user.id,
            fullname: user.fullname,
            phone: user.phone,
            email: user.email,
            role: user.role || 'user',
            targetPhone: TARGET_PHONE
        };
        
        localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(currentUser));
        
        showAlert(`🎉 Welcome ${user.fullname}! Redirecting...`, 'success');
        
        setTimeout(() => {
            if (currentUser.role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'deposit.html';
            }
        }, 1500);
    }

    function toggleForm(formType) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const toggleBtns = document.querySelectorAll('.toggle-btn');
        clearAlerts();
        
        if (formType === 'login') {
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
            toggleBtns[0].classList.add('active');
            toggleBtns[1].classList.remove('active');
        } else {
            loginForm.classList.remove('active');
            registerForm.classList.add('active');
            toggleBtns[0].classList.remove('active');
            toggleBtns[1].classList.add('active');
        }
    }

    function checkLoggedInUser() {
        const currentUser = localStorage.getItem(CURRENT_USER_KEY);
        if (currentUser) {
            const user = JSON.parse(currentUser);
            if (user.role === 'admin' && window.location.pathname.includes('admin.html')) {
                return;
            } else if (user.role !== 'admin' && !window.location.pathname.includes('login.html')) {
                // Already logged in as normal user
            }
        }
    }

    function createDefaultUsers() {
        const users = getUsers();
        if (users.length === 0) {
            users.push({
                id: 'demo123',
                fullname: 'Demo User',
                phone: '0767332532',
                email: 'demo@deposithub.com',
                password: 'demo123',
                role: 'user',
                createdAt: new Date().toISOString(),
                targetPhone: TARGET_PHONE
            });
            users.push({
                id: 'admin123',
                fullname: 'Administrator',
                phone: '0767332532',
                email: 'admin@deposithub.com',
                password: 'admin123',
                role: 'admin',
                createdAt: new Date().toISOString(),
                targetPhone: TARGET_PHONE
            });
            saveUsers(users);
            console.log('Default users created');
        }
    }

    document.getElementById('loginFormElement').addEventListener('submit', loginUser);
    document.getElementById('registerFormElement').addEventListener('submit', registerUser);
    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', function() { toggleForm(this.dataset.form); });
    });
    
    document.getElementById('regPhone')?.addEventListener('input', function() {
        let cleaned = this.value.replace(/\D/g, '');
        if (cleaned.length > 10) cleaned = cleaned.slice(0, 10);
        this.value = cleaned;
    });
    
    window.togglePassword = togglePassword;
    
    createDefaultUsers();
    checkLoggedInUser();
</script>

</body>
</html>
